name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/rendspec${EXT}" ./cmd/rendspec
          go build -ldflags="-s -w" -o "dist/rendspec-mcp${EXT}" ./cmd/rendspec-mcp

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ARCHIVE="rendspec-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            cd dist && zip "../${ARCHIVE}.zip" rendspec.exe rendspec-mcp.exe
          else
            tar -czf "${ARCHIVE}.tar.gz" -C dist rendspec rendspec-mcp
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rendspec-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rendspec-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
